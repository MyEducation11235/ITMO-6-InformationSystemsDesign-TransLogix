<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TransLogix{% endblock %} — TransLogix</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Leaflet -->
  <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet" />
  <!-- Custom -->
  <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet" />
  {% block head %}{% endblock %}
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <i class="bi bi-truck-front-fill me-2"></i>
    <span>TransLogix</span>
  </div>
  <nav class="sidebar-nav">
    <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
      <i class="bi bi-speedometer2"></i><span>Дашборд</span>
    </a>
    <a href="/warehouses" class="nav-link {% if request.path == '/warehouses' %}active{% endif %}">
      <i class="bi bi-building"></i><span>Склады</span>
    </a>
    <a href="/products" class="nav-link {% if request.path == '/products' %}active{% endif %}">
      <i class="bi bi-boxes"></i><span>Товары и запасы</span>
    </a>
    <a href="/orders" class="nav-link {% if request.path == '/orders' %}active{% endif %}">
      <i class="bi bi-clipboard-check"></i><span>Заказы</span>
    </a>
    <a href="/route-builder" class="nav-link {% if request.path == '/route-builder' %}active{% endif %}">
      <i class="bi bi-map"></i><span>Построить маршрут</span>
    </a>
    <a href="/routes" class="nav-link {% if request.path == '/routes' %}active{% endif %}">
      <i class="bi bi-signpost-2"></i><span>Маршруты</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <small class="text-muted">© 2025 TransLogix</small>
  </div>
</div>

<!-- Main content -->
<div class="main-content" id="mainContent">
  <!-- Topbar -->
  <div class="topbar">
    <button class="btn btn-sm btn-outline-secondary me-3" id="sidebarToggle">
      <i class="bi bi-list"></i>
    </button>
    <h5 class="mb-0 fw-semibold">{% block page_title %}Дашборд{% endblock %}</h5>
    <div class="ms-auto d-flex align-items-center gap-2">
      <span class="badge bg-success-subtle text-success border border-success-subtle">
        <i class="bi bi-circle-fill me-1" style="font-size:.5rem"></i>Онлайн
      </span>
    </div>
  </div>

  <!-- Page body -->
  <div class="page-body">
    {% block content %}{% endblock %}
  </div>
</div>

<!-- Toast container -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Custom JS -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}

<script>
  document.getElementById('sidebarToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('collapsed');
    document.getElementById('mainContent').classList.toggle('expanded');
  });
</script>
</body>
</html>
