{% extends "base.html" %}
{% block title %}Заказы{% endblock %}
{% block page_title %}Управление заказами{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
  <div class="d-flex gap-2">
    <select class="form-select form-select-sm" id="statusFilter" style="width:auto" onchange="loadOrders()">
      <option value="">Все статусы</option>
      <option value="new">Новые</option>
      <option value="in_route">В маршруте</option>
      <option value="completed">Выполненные</option>
    </select>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-outline-success" id="buildRouteBtn" onclick="goToBuildRoute()" disabled>
      <i class="bi bi-map me-1"></i>Построить маршрут
      <span class="badge bg-success ms-1" id="selectedCount">0</span>
    </button>
    <button class="btn btn-primary" onclick="openOrderModal()">
      <i class="bi bi-plus-lg me-1"></i>Создать заказ
    </button>
  </div>
</div>

<div class="card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th><input type="checkbox" id="selectAll" onchange="toggleAll(this)" /></th>
            <th>#</th><th>Товар</th><th>Кол-во</th><th>Адрес доставки</th>
            <th>Координаты</th><th>Статус</th><th>Создан</th><th>Действия</th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <tr><td colspan="9" class="text-center text-muted py-3">Загрузка…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Order Modal -->
<div class="modal fade" id="orderModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Новый заказ</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Товар <span class="text-danger">*</span></label>
            <select class="form-select" id="oProduct"></select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Количество <span class="text-danger">*</span></label>
            <input type="number" min="0.1" step="0.1" class="form-control" id="oQty" />
          </div>
          <div class="col-12">
            <label class="form-label">Адрес доставки <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="oAddress" placeholder="Москва, ул. Примерная, 1" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Широта (lat) <span class="text-danger">*</span></label>
            <input type="number" step="0.0001" class="form-control" id="oLat" placeholder="55.7558" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Долгота (lon) <span class="text-danger">*</span></label>
            <input type="number" step="0.0001" class="form-control" id="oLon" placeholder="37.6173" />
          </div>
        </div>
        <div id="orderFormError" class="alert alert-danger d-none mt-3"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
        <button class="btn btn-primary" onclick="saveOrder()">Создать заказ</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let ordersData = [], selectedOrders = new Set();

async function loadOrders() {
  const status = document.getElementById('statusFilter').value;
  const url = status ? `/api/orders?status=${status}` : '/api/orders';
  ordersData = await apiFetch(url);
  renderOrders();
}

function renderOrders() {
  const tbody = document.getElementById('ordersBody');
  if (!ordersData || !ordersData.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">Нет заказов</td></tr>'; return;
  }
  tbody.innerHTML = ordersData.map(o => {
    const checked = selectedOrders.has(o.id);
    const canSelect = o.status === 'new';
    return `<tr class="${checked ? 'table-primary' : ''}">
      <td><input type="checkbox" class="order-cb" value="${o.id}" ${checked ? 'checked' : ''} ${!canSelect ? 'disabled' : ''} onchange="toggleOrder(${o.id}, this.checked)" /></td>
      <td><span class="text-muted">#${o.id}</span></td>
      <td><strong>${o.product_name || '—'}</strong></td>
      <td>${o.quantity} ${o.product_unit || ''}</td>
      <td class="text-truncate" style="max-width:200px;">${o.delivery_address}</td>
      <td><code>${o.delivery_lat}, ${o.delivery_lon}</code></td>
      <td><span class="badge ${statusBadge(o.status)}">${statusLabel(o.status)}</span></td>
      <td><small class="text-muted">${formatDate(o.created_at)}</small></td>
      <td>
        ${o.status === 'in_route' ? `<button class="btn btn-sm btn-outline-success me-1" onclick="markCompleted(${o.id})" title="Отметить выполненным"><i class="bi bi-check2"></i></button>` : ''}
        <button class="btn btn-sm btn-outline-danger" onclick="deleteOrder(${o.id})"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`;
  }).join('');
  updateSelectedCount();
}

function toggleOrder(id, checked) {
  if (checked) selectedOrders.add(id); else selectedOrders.delete(id);
  updateSelectedCount();
  renderOrders();
}

function toggleAll(cb) {
  const newOrders = ordersData.filter(o => o.status === 'new');
  newOrders.forEach(o => { if (cb.checked) selectedOrders.add(o.id); else selectedOrders.delete(o.id); });
  updateSelectedCount();
  renderOrders();
}

function updateSelectedCount() {
  const count = selectedOrders.size;
  document.getElementById('selectedCount').textContent = count;
  document.getElementById('buildRouteBtn').disabled = count === 0;
}

function goToBuildRoute() {
  if (selectedOrders.size === 0) return;
  localStorage.setItem('selectedOrderIds', JSON.stringify([...selectedOrders]));
  window.location.href = '/route-builder';
}

async function openOrderModal() {
  const products = await apiFetch('/api/products');
  const pSel = document.getElementById('oProduct');
  pSel.innerHTML = products.map(p => `<option value="${p.id}">${p.name} (${p.unit})</option>`).join('');
  document.getElementById('oQty').value = '';
  document.getElementById('oAddress').value = '';
  document.getElementById('oLat').value = '';
  document.getElementById('oLon').value = '';
  document.getElementById('orderFormError').classList.add('d-none');
  new bootstrap.Modal(document.getElementById('orderModal')).show();
}

async function saveOrder() {
  const errEl = document.getElementById('orderFormError');
  const body = {
    product_id: parseInt(document.getElementById('oProduct').value),
    quantity: parseFloat(document.getElementById('oQty').value),
    delivery_address: document.getElementById('oAddress').value.trim(),
    delivery_lat: parseFloat(document.getElementById('oLat').value),
    delivery_lon: parseFloat(document.getElementById('oLon').value),
  };
  if (!body.delivery_address || isNaN(body.quantity) || isNaN(body.delivery_lat) || isNaN(body.delivery_lon)) {
    errEl.textContent = 'Заполните все обязательные поля корректно.'; errEl.classList.remove('d-none'); return;
  }
  errEl.classList.add('d-none');
  const res = await apiFetch('/api/orders', { method: 'POST', body: JSON.stringify(body) });
  if (res) { bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide(); showToast('Заказ создан', 'success'); loadOrders(); }
}

async function markCompleted(id) {
  await apiFetch(`/api/orders/${id}`, { method: 'PUT', body: JSON.stringify({ status: 'completed' }) });
  showToast('Заказ выполнен', 'success'); loadOrders();
}

async function deleteOrder(id) {
  if (!confirm('Удалить заказ?')) return;
  await apiFetch(`/api/orders/${id}`, { method: 'DELETE' });
  selectedOrders.delete(id);
  showToast('Заказ удалён', 'warning'); loadOrders();
}

loadOrders();
</script>
{% endblock %}
